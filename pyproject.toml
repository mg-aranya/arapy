[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "arapy"
version = "1.2.6"
description = "ClearPass API client"
authors = [{ name = "Mathias Granlund", email = "mathias.granlund@aranya.se" }]
requires-python = ">=3.10"
dependencies = [
    "requests",
]

[project.optional-dependencies]
test = ["pytest>=7.0"]

[project.scripts]
arapy = "arapy.main:main"

[tool.setuptools.packages.find]
include = ["arapy*"]
exclude = ["cache*", "logs*", "tests*"]
