[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "arapy"
version = "1.4.6"
description = "CLI toolkit for HPE Aruba ClearPass Policy Manager"
readme = "README.md"
authors = [{ name = "Mathias Granlund", email = "mathias.granlund@aranya.se" }]
requires-python = ">=3.10"
dependencies = ["requests>=2.31"]
keywords = ["clearpass", "aruba", "cli", "rest-api"]

[project.optional-dependencies]
dev = [
    "hypothesis>=6.0",
    "pytest>=9.0",
    "ruff>=0.15",
]

[project.scripts]
arapy = "arapy.cli.main:main"

[tool.setuptools.packages.find]
include = ["arapy*"]
exclude = ["tests*", "cache*", "logs*", "examples*"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
